<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
<title>AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font:-apple-system-body;background:#000;color:#fff;height:100vh;display:flex;flex-direction:column}
#chat{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}
.msg{max-width:90%;margin:6px 0;padding:10px 14px;border-radius:18px;line-height:1.5;font-size:16px;word-break:break-word}
.user{background:#007aff;align-self:flex-end;margin-left:auto;border-bottom-right-radius:4px}
.assistant{background:#1c1c1e;align-self:flex-start;border-bottom-left-radius:4px}
#input-box{display:flex;padding:8px;background:#1c1c1e;gap:8px}
#input{flex:1;padding:12px 16px;border-radius:24px;border:none;background:#2c2c2e;color:#fff;font-size:16px;outline:none}
#send{width:44px;height:44px;border-radius:50%;border:none;background:#007aff;color:#fff;font-size:20px;cursor:pointer;flex-shrink:0}
.loading{display:inline-block;width:8px;height:8px;border-radius:50%;background:#999;animation:blink 0.8s infinite}
@keyframes blink{50%{opacity:0.3}}

/* Markdown 样式 */
.assistant h1{font-size:22px;margin:12px 0 6px}
.assistant h2{font-size:20px;margin:10px 0 6px}
.assistant h3{font-size:18px;margin:8px 0 4px}
.assistant h4,.assistant h5,.assistant h6{font-size:17px;margin:6px 0 4px}
.assistant p{margin:4px 0}
.assistant ul,.assistant ol{padding-left:20px;margin:4px 0}
.assistant li{margin:2px 0}
.assistant strong{font-weight:600}
.assistant em{font-style:italic}
.assistant del{text-decoration:line-through;opacity:0.6}
.assistant pre{background:#2c2c2e;padding:10px;border-radius:8px;overflow-x:auto;font-size:14px;margin:8px 0}
.assistant code{background:#2c2c2e;padding:2px 6px;border-radius:4px;font-size:14px}
.assistant pre code{padding:0;background:none}
.assistant blockquote{border-left:3px solid #007aff;padding-left:10px;margin:8px 0;opacity:0.85}
.assistant hr{border:none;border-top:1px solid #3a3a3c;margin:12px 0}
.assistant a{color:#007aff;text-decoration:none}
</style>
</head>
<body>
<div id="chat"></div>
<div id="input-box">
  <input id="input" type="text" placeholder="问点什么..." autocomplete="off">
  <button id="send">↑</button>
</div>
<script>
// ========== 对话历史 ==========
const systemPrompt = '你是AI助手，用简洁的中文回答。遵守以下规则：\n- 禁止使用表格\n- 禁止使用LaTeX数学公式（如$$、$、\\frac等）';

let messages = [
  { role: 'system', content: systemPrompt }
];

// ========== DOM 元素 ==========
const chatDiv = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');

// ========== Markdown 渲染 ==========
function renderMD(text) {
  let html = text
    // 1. HTML 转义
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    // 2. 代码块
    .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    // 3. 行内代码
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // 4. 标题（从6到1）
    .replace(/^###### (.+)$/gm, '<h6>$1</h6>')
    .replace(/^##### (.+)$/gm, '<h5>$1</h5>')
    .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    // 5. 分割线
    .replace(/^---+$/gm, '<hr>')
    // 6. 无序列表
    .replace(/^[\-*] (.+)$/gm, '<li>$1</li>')
    // 7. 有序列表
    .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
    // 8. 粗体
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    // 9. 斜体
    .replace(/\*([^*]+)\*/g, '<em>$1</em>')
    .replace(/_([^_]+)_/g, '<em>$1</em>')
    // 10. 删除线
    .replace(/~~([^~]+)~~/g, '<del>$1</del>')
    // 11. 链接
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
    // 12. 换行
    .replace(/\n/g, '<br>');

  return html;
}

// ========== 添加消息到屏幕 ==========
function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (role === 'assistant') {
    div.innerHTML = renderMD(text);
  } else {
    div.textContent = text;
  }
  chatDiv.appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });

  // 屏幕最多保留50条
  while (chatDiv.children.length > 50) {
    chatDiv.removeChild(chatDiv.firstChild);
  }
}

// ========== 发送请求 ==========
async function send() {
  const text = inputEl.value.trim();
  if (!text) return;

  // 用户消息
  addMsg('user', text);
  messages.push({ role: 'user', content: text });
  inputEl.value = '';

  // 创建AI消息占位
  const aiDiv = document.createElement('div');
  aiDiv.className = 'msg assistant';
  aiDiv.innerHTML = '<span class="loading"></span>';
  chatDiv.appendChild(aiDiv);
  aiDiv.scrollIntoView({ behavior: 'smooth' });

  let fullReply = '';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: messages })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error || '请求失败');
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          if (data === '[DONE]') continue;
          try {
            const chunk = JSON.parse(data);
            const content = chunk.choices[0].delta.content;
            if (content) {
              fullReply += content;
              aiDiv.innerHTML = renderMD(fullReply);
              aiDiv.scrollIntoView({ behavior: 'smooth' });
            }
          } catch(e) {}
        }
      }
    }
  } catch(e) {
    aiDiv.innerHTML = '出错了：' + e.message;
    fullReply = '';
  }

  // 保存AI完整回复
  if (fullReply) {
    messages.push({ role: 'assistant', content: fullReply });
  }

  // DOM超过50条清理
  while (chatDiv.children.length > 50) {
    chatDiv.removeChild(chatDiv.firstChild);
  }
}

// ========== 事件绑定 ==========
sendBtn.addEventListener('click', send);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    send();
  }
});
inputEl.focus();
</script>
</body>
</html>
